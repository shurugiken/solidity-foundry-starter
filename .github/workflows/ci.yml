name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install forge-std
        run: forge install foundry-rs/forge-std --no-commit
      - name: Run tests
        run: forge test -vvv
